site_name: flet-orbit
site_url: https://flet-orbit.gabover.se
theme:
  name: material
  palette: 
    - scheme: default
      primary: white
      accent: light blue
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
    - scheme: slate
      toggle:
        primary: black
        accent: light blue
        icon: material/brightness-4
        name: Switch to light mode
  logo: assets/img/flet-orbit-isotype.png
  favicon: assets/img/flet-orbit-isotype.png
extra_css:
  - stylesheets/extra.css
nav:
  - fletflow: index.md
  - Getting Started: getting-started.md
  - Project Structure: project-structure.md
  - Makefile: makefile.md
