site_name: flet-orbit
site_url: https://flet-orbit.gabover.se
repo_url: https://github.com/gaboverse/flet-orbit
repo_name: gaboverse/flet-orbit
theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette: 
    - scheme: default
      primary: white
      accent: light blue
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: assets/img/flet-orbit-isotype.png
  favicon: assets/img/flet-orbit-isotype.png
extra_css:
  - stylesheets/extra.css
nav:
  - flet-orbit: index.md
  - Getting Started: getting-started.md
  - Project Structure: project-structure.md
  - Makefile: makefile.md
